
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y 

  - name: enable nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - nodejs
    - mysql

  - name: create expense user
    ansible.builtin.user:
      name: expense

  # - name: create app directory
    # ansible.builtin.file:
      # path: /app
      # state: directory
 
  # - name: download backend code
    # ansible.builtin.get_url:
      # url: https://expense-builds-manikanta.s3.us-east-1.amazonaws.com/expense-backend-v2-new.zip
      # dest: /tmp/backend.zip

  # - name: unzip backend code 
    # ansible.builtin.unarchive:
      # src: /tmp/backend.zip # by default check in ansible server
      # dest: /app
      # remote_src: yes

  - name: run app pre-requisites
    tags:
    - deployment
    ansible.builtin.import_role:
      name: common
      tasks_from: app-pre-req 

  - name: install npm dependencies
    ansible.builtin.command: npm install
    args:
      chdir: /app 

  - name: copy backend service
    ansible.builtin.template:
      src: backend.service.j2
      dest: /etc/systemd/system/backend.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: Enable backend service
    ansible.builtin.service:
      name: backend
      enabled: yes    

  - name: install python mysql dependencies
    ansible.builtin.pip:
      name: 
      - PyMySQL
      - cryptography
      executable: pip3.9 # pip3.11 if pythonversion is 3.11
  
  # - name: wait for DB to be ready
    # ansible.builtin.wait_for:
      # host: "{{ login_host }}"
      # port: 3306
      # timeout: 300

  # - name: create database
    # community.mysql.mysql_db:
      # name: expense
      # state: present
      # login_user: "{{ login_user }}"
      # login_password: "{{ login_password }}"
      # login_host: "{{ login_host }}"

  - name: import data into mysql 
    community.mysql.mysql_db:
      login_user: "{{ login_user }}"
      login_password: "{{ login_password }}"
      login_host: "{{ login_host }}"
      target: /app/schema/backend.sql 
      state: import
      name: all

  
  - name: start and enable backend service
    tags:
    - deployment
    ansible.builtin.service:
      name: backend
      state: restarted
      enabled: yes